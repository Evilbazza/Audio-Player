<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Drive Audio Player</title>
<style>
  :root {
    --bg:        #0d1f2d;
    --surface:   #1a3040;
    --surface2:  #213d50;
    --border:    #2a4a5e;
    --accent:    #4ecdc4;
    --accent2:   #38b2aa;
    --text:      #cce8e6;
    --muted:     #6a9eaa;
    --error:     #e8504a;
    --success:   #4ecdc4;
    --radius:    12px;
    --font-mono: 'Courier New', Courier, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100dvh;
    padding: 16px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: normal;
    letter-spacing: 0.04em;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .tagline {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-bottom: 20px;
    letter-spacing: 0.06em;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }

  .field-label {
    display: block;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.82rem;
    padding: 13px 12px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); opacity: 0.7; }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    min-height: 52px;
    padding: 0 20px;
    border: none;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  .btn-primary { background: var(--accent); color: #0d1f2d; font-weight: bold; }
  .btn-primary:not(:disabled):hover { background: var(--accent2); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    margin-top: 10px;
  }
  .btn-secondary:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }

  #play-panel { display: none; }

  .filename {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--accent);
    word-break: break-all;
    line-height: 1.4;
    margin-bottom: 14px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
    min-height: 42px;
  }

  audio {
    width: 100%;
    height: 48px;
    border-radius: 8px;
    outline: none;
    accent-color: var(--accent);
    background: var(--surface2);
  }

  audio::-webkit-media-controls-panel { background: var(--surface2); }

  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 12px 0;
  }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--muted);
    transition: background 0.3s;
  }

  .status-dot.loading  { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
  .status-dot.playing  { background: var(--success); animation: pulse 1.5s ease-in-out infinite; }
  .status-dot.finished { background: var(--muted); animation: none; }
  .status-dot.error    { background: var(--error); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  #status-text {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .error-msg {
    display: none;
    color: var(--error);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    padding: 10px 12px;
    background: rgba(232,80,74,0.08);
    border: 1px solid rgba(232,80,74,0.25);
    border-radius: 8px;
    line-height: 1.5;
  }
  .error-msg.visible { display: block; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  .signed-in-row {
    display: none;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.06em;
    margin-top: 12px;
  }
  .signed-in-row.visible { display: flex; }

  .dot-teal {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<h1>Drive Audio Player</h1>
<p class="tagline">// random · private · offline-ready</p>

<div class="card" id="auth-card">
  <label class="field-label" for="client-id-input">OAuth Client ID</label>
  <input
    type="text"
    id="client-id-input"
    placeholder="123456789-abc.apps.googleusercontent.com"
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
  >
  <div style="margin-top:14px;">
    <button class="btn btn-primary" id="signin-btn" onclick="startSignIn()">Sign in with Google</button>
  </div>
  <div class="signed-in-row" id="signed-in-row">
    <span class="dot-teal"></span>
    <span>Signed in</span>
  </div>
</div>

<div class="card" id="folder-card" style="display:none;">
  <label class="field-label" for="folder-id-input">Google Drive Folder ID</label>
  <input
    type="text"
    id="folder-id-input"
    placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs"
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
  >
  <button class="btn btn-primary" style="margin-top:14px;" onclick="loadAndPlay()">▶ Load &amp; Play</button>
</div>

<div class="card" id="play-panel">
  <div class="filename" id="filename-display">—</div>
  <audio id="audio-player" controls></audio>
  <div class="status-row">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Idle</span>
  </div>
  <div class="error-msg" id="error-msg"></div>
  <hr class="divider">
  <button class="btn btn-secondary" id="another-btn" onclick="playAnother()" disabled>↺ Play Another</button>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
let accessToken   = null;
let fileList      = [];
let currentObjUrl = null;

const AUDIO_MIMES = new Set([
  'audio/mpeg','audio/ogg','audio/wav','audio/x-m4a','audio/mp4','audio/flac'
]);

window.addEventListener('DOMContentLoaded', () => {
  const ci = document.getElementById('client-id-input');
  const fi = document.getElementById('folder-id-input');
  const sc = localStorage.getItem('gd_client_id');
  const sf = localStorage.getItem('gd_folder_id');
  if (sc) ci.value = sc;
  if (sf) fi.value = sf;
  ci.addEventListener('input', () => localStorage.setItem('gd_client_id', ci.value.trim()));
  fi.addEventListener('input', () => localStorage.setItem('gd_folder_id', fi.value.trim()));
});

const clientIdInput   = () => document.getElementById('client-id-input').value.trim();
const folderIdInput   = () => document.getElementById('folder-id-input').value.trim();
const signInBtn       = document.getElementById('signin-btn');
const signedInRow     = document.getElementById('signed-in-row');
const folderCard      = document.getElementById('folder-card');
const playPanel       = document.getElementById('play-panel');
const audioPlayer     = document.getElementById('audio-player');
const filenameDisplay = document.getElementById('filename-display');
const statusDot       = document.getElementById('status-dot');
const statusText      = document.getElementById('status-text');
const errorMsg        = document.getElementById('error-msg');
const anotherBtn      = document.getElementById('another-btn');

function setStatus(state, message) {
  statusDot.className    = 'status-dot ' + state;
  statusText.textContent = message;
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('visible');
  setStatus('error', 'Error');
}

function clearError() {
  errorMsg.textContent = '';
  errorMsg.classList.remove('visible');
}

function startSignIn() {
  clearError();
  const clientId = clientIdInput();
  if (!clientId) { showError('Please paste your OAuth Client ID first.'); return; }

  const tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: 'https://www.googleapis.com/auth/drive.readonly',
    callback: handleTokenResponse,
    error_callback: handleTokenError,
  });
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function handleTokenResponse(r) {
  if (r && r.access_token) {
    accessToken = r.access_token;
    signInBtn.textContent    = '✓ Signed In';
    signInBtn.disabled       = true;
    signedInRow.classList.add('visible');
    folderCard.style.display = 'block';
    setStatus('', 'Ready');
  } else {
    showError('Sign-in failed: no access token returned.');
  }
}

function handleTokenError(err) {
  showError('OAuth error: ' + (err.message || err.type || JSON.stringify(err)));
}

async function loadAndPlay() {
  clearError();
  const folderId = folderIdInput();
  if (!folderId)    { showError('Please paste a Google Drive Folder ID.'); return; }
  if (!accessToken) { showError('Not signed in. Please sign in with Google first.'); return; }

  setStatus('loading', 'Loading file list…');
  playPanel.style.display = 'block';
  anotherBtn.disabled     = true;
  fileList = [];

  const mimeFilter = [...AUDIO_MIMES].map(m => `mimeType='${m}'`).join(' or ');
  const params = new URLSearchParams({
    q: `'${folderId}' in parents and (${mimeFilter}) and trashed=false`,
    fields: 'files(id,name,mimeType)',
    pageSize: '1000',
  });

  try {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?${params}`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    if (res.status === 401) { showError('Auth failure (401). Your token may have expired — please sign in again.'); return; }
    if (!res.ok)            { showError(`Drive API error: ${res.status} ${res.statusText}`); return; }

    const data = await res.json();
    fileList = data.files || [];

    if (fileList.length === 0) {
      showError('No audio files found in that folder. Supported formats: MP3, OGG, WAV, M4A, FLAC.');
      setStatus('', 'Idle');
      return;
    }
    playRandomFile();
  } catch (err) {
    showError('Network error fetching file list: ' + err.message);
  }
}

async function playRandomFile() {
  clearError();
  if (fileList.length === 0) { showError('No files cached.'); return; }

  audioPlayer.pause();
  revokeCurrentUrl();

  const file = fileList[Math.floor(Math.random() * fileList.length)];
  filenameDisplay.textContent = file.name;
  setStatus('loading', 'Fetching audio…');
  anotherBtn.disabled = true;

  try {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    if (res.status === 401) { showError('Auth failure (401). Please sign in again.'); return; }
    if (!res.ok)            { showError(`Fetch error: ${res.status} ${res.statusText}`); return; }

    const blob    = await res.blob();
    currentObjUrl = URL.createObjectURL(blob);
    audioPlayer.src  = currentObjUrl;
    audioPlayer.loop = false;

    audioPlayer.onended = () => {
      setStatus('finished', 'Finished');
      revokeCurrentUrl();
      anotherBtn.disabled = false;
    };
    audioPlayer.onerror = () => {
      showError('Playback error. The file may be in an unsupported format.');
      revokeCurrentUrl();
      anotherBtn.disabled = false;
    };

    setStatus('playing', 'Playing');
    anotherBtn.disabled = false;
    await audioPlayer.play();

  } catch (err) {
    showError('Failed to fetch audio file: ' + err.message);
    revokeCurrentUrl();
    anotherBtn.disabled = false;
  }
}

function playAnother() { if (fileList.length > 0) playRandomFile(); }

function revokeCurrentUrl() {
  if (currentObjUrl) { URL.revokeObjectURL(currentObjUrl); currentObjUrl = null; }
}
</script>
</body>
</html>
